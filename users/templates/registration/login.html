{% extends "successify/base.html" %}

{% block content %}

{% if form.errors %}
    <p>Tu nombre de usuario y/o contraseña no coinciden. Intenta nuevamente.</p> 
{% endif %}

<form action="{% url 'users:login' %}" method='post'>
    {% csrf_token %}
    {{ form.as_div}}

    <button name='submit'>Ingresar</button>
</form>

{% endblock content %}
